name: Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ===========================================
  # VERSION CALCULATION
  # ===========================================
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version calculation

      - name: Calculate version
        id: version
        run: |
          # Get the latest tag or default to v0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Extract version numbers
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Default values if parsing fails
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          
          # Determine bump type
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          if [ -z "$BUMP_TYPE" ]; then
            # Auto-detect from commit message
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -qi "BREAKING CHANGE\|^feat!:\|^fix!:"; then
              BUMP_TYPE="major"
            elif echo "$COMMIT_MSG" | grep -qi "^feat:"; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="patch"
            fi
          fi
          
          echo "Bump type: $BUMP_TYPE"
          
          # Calculate new version
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          
          # Calculate version code (for Play Store, must be incrementing integer)
          # Format: MAJOR * 10000 + MINOR * 100 + PATCH
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          
          # Determine if we should create a release
          SHOULD_RELEASE="false"
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            SHOULD_RELEASE="true"
          fi
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SHOULD_RELEASE="true"
          fi
          
          echo "New version: $NEW_VERSION"
          echo "Version code: $VERSION_CODE"
          echo "Should release: $SHOULD_RELEASE"
          
          echo "version_name=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT

  # ===========================================
  # BUILD DEBUG APK (for PRs)
  # ===========================================
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: version
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        env:
          VERSION_NAME: ${{ needs.version.outputs.version_name }}
          VERSION_CODE: ${{ needs.version.outputs.version_code }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ===========================================
  # BUILD RELEASE APK/AAB
  # ===========================================
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.should_release == 'true'
    env:
      # Surface secrets as env so steps can branch on their presence
      # (the `secrets` context is not allowed directly in `if:` expressions).
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Decode the upload keystore from a base64 secret (skipped if not configured —
      # the build then falls back to debug signing, which is fine for the GitHub APK
      # but NOT acceptable for Play Store uploads).
      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/app/release-keystore.jks"

      - name: Build Release APK
        env:
          VERSION_NAME: ${{ needs.version.outputs.version_name }}
          VERSION_CODE: ${{ needs.version.outputs.version_code }}
          KEYSTORE_FILE: ${{ github.workspace }}/app/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB (for Play Store)
        env:
          VERSION_NAME: ${{ needs.version.outputs.version_name }}
          VERSION_CODE: ${{ needs.version.outputs.version_code }}
          KEYSTORE_FILE: ${{ github.workspace }}/app/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 90

  # ===========================================
  # CREATE GITHUB RELEASE
  # ===========================================
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-release]
    if: needs.version.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./release-apk

      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: ./release-aab

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get commits since last tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -n "$LATEST_TAG" ]; then
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          
          # Create release notes
          cat << EOF > release_notes.md
          ## What's New in v${{ needs.version.outputs.version_name }}
          
          ### Changes
          ${COMMITS}
          
          ### Build Info
          - **Version Name:** ${{ needs.version.outputs.version_name }}
          - **Version Code:** ${{ needs.version.outputs.version_code }}
          - **Build Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
          - **Commit:** ${{ github.sha }}
          
          ### Downloads
          - **APK:** For direct installation on Android devices
          - **AAB:** For Google Play Store submission
          EOF
          
          echo "Generated release notes"

      - name: Rename artifacts
        run: |
          # Rename APK with version
          for f in ./release-apk/*.apk; do
            mv "$f" "./release-apk/CleanPhoneLauncher-v${{ needs.version.outputs.version_name }}.apk"
          done
          
          # Rename AAB with version
          for f in ./release-aab/*.aab; do
            mv "$f" "./release-aab/CleanPhoneLauncher-v${{ needs.version.outputs.version_name }}.aab"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.version_name }}
          name: CleanPhoneLauncher v${{ needs.version.outputs.version_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            ./release-apk/*.apk
            ./release-aab/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================
  # PLAY STORE DEPLOYMENT
  # ===========================================
  # Runs automatically, but the upload step self-skips until the
  # PLAY_STORE_SERVICE_ACCOUNT_JSON secret is configured. Deploys to the
  # "internal" testing track by default — change `track` below to promote.
  # NOTE: the very first release for a package must be uploaded MANUALLY in the
  # Play Console; the API can only update an app that already has one release.
  deploy-play-store:
    name: Deploy to Play Store
    runs-on: ubuntu-latest
    needs: [version, build-release, github-release]
    if: needs.version.outputs.should_release == 'true'
    env:
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: ./release-aab

      - name: Prepare release notes
        run: |
          mkdir -p ./whatsnew
          echo "Version ${{ needs.version.outputs.version_name }} — bug fixes and stability improvements." \
            > ./whatsnew/whatsnew-en-US.txt

      - name: Deploy to Play Store (internal track)
        if: env.PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: dev.rikoapp.cleanphonelauncher
          releaseFiles: ./release-aab/*.aab
          track: internal  # internal | alpha | beta | production
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: ./whatsnew

      - name: Play deploy skipped notice
        if: env.PLAY_SERVICE_ACCOUNT_JSON == ''
        run: echo "⏭️  PLAY_STORE_SERVICE_ACCOUNT_JSON secret not set — skipping Play Store upload."

